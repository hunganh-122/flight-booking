<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lựa Chọn Chuyến Bay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <th:block th:replace="~{/common/layout :: head}"></th:block>
    <link rel="stylesheet" href="/css/flights.css">
    <link rel="stylesheet" href="/css/seat-re.css">
</head>
<body>
<th:block th:replace="~{/common/layout :: loading}"></th:block>
<th:block th:replace="~{/common/layout :: navbar}"></th:block>
<!-- file.list.html -->
<div class="container pt-5">
    <div class="container-content my-5">
        <div class="row">
            <div class="col-12 text-center">
                <h1><i class="fa-solid fa-plane me-3"></i>Lựa Chọn Chuyến Máy Bay</h1>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="location-info">
                    <p><i class="fas fa-map-marker-alt me-2" id="departureAirportId"></i>Khởi hành</p>
                    <h3 th:text="${departureAirport.airportName} + ' (' + ${departureAirport.airportCode} + ')'"></h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="location-info">
                    <p><i class="fas fa-map-marker-alt me-2"></i>Điểm đến</p>
                    <h3 th:text="${arrivalAirport.airportName} + ' (' + ${arrivalAirport.airportCode} + ')'"></h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="location-info" th:if="${!departureDate.isEmpty()}">
                    <p><i class="fa-regular fa-calendar-days me-2"></i>Ngày</p>
                    <h3 th:text="${departureDate}"></h3>
                </div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12">
                <form id="search-form" action="/flightDate" method="post">
                    <input type="hidden" id="selected-date" name="selectedDate"/>
                    <input type="hidden" name="departureAirportCode" th:value="${departureAirport.airportCode}"/>
                    <input type="hidden" name="arrivalAirportCode" th:value="${arrivalAirport.airportCode}"/>
                    <input type="hidden" name="passengers" th:value="${passengers}"/>
                </form>
                <div id="date-selector1" class="date-selector d-flex justify-content-center mb-4"></div>
                <h3 th:if="${flights.isEmpty()}" class="text-center fw-bold text-result">Không có chuyến máy bay cần
                    tìm!!</h3>
                <div id="search-meta" th:attr="data-trip-type=${tripType}"></div>
                
                <!-- LAYOUT MỚI: Train Cards -->
                <div th:unless="${flights.isEmpty()}" class="train-list">
                    <div th:each="flight : ${flights}" class="train-card">
                        <div class="train-info">
                            <div class="train-code" th:text="${flight.flightNumber}"></div>
                            <div class="available-seats" th:text="${'Còn ' + (availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) + ' ghế trống'}"></div>
                        </div>

                        <div class="journey-details">
                            <div class="station-time">
                                <div class="station-name" th:text="${departureAirport.airportName}"></div>
                                <div class="time" th:text="${#temporals.format(flight.departureTime, 'HH:mm')}"></div>
                                <div class="date" th:text="${#temporals.format(flight.departureTime, 'dd/MM/yyyy')}"></div>
                            </div>

                            <div class="journey-visual">
                                <div class="train-number">
                                    <span th:with="hours=${T(java.time.Duration).between(flight.departureTime, flight.arrivalTime).toHours()},
                                                   minutes=${T(java.time.Duration).between(flight.departureTime, flight.arrivalTime).toMinutes() % 60}"
                                          th:text="${hours + 'h' + minutes + 'p'}">
                                    </span>
                                </div>
                                <div class="journey-line"></div>
                                <div class="fas fa-arrow-right me-2"></div>
                            </div>

                            <div class="station-time">
                                <div class="station-name" th:text="${arrivalAirport.airportName}"></div>
                                <div class="time" th:text="${#temporals.format(flight.arrivalTime, 'HH:mm')}"></div>
                                <div class="date" th:text="${#temporals.format(flight.arrivalTime, 'dd/MM/yyyy')}"></div>
                            </div>
                        </div>

                        <div class="price-booking">
                            <div class="price-label">Từ</div>
                            <div class="price">
                                <span th:text="${minPrices[flight.flightId] != null ? 
                                    #numbers.formatDecimal(minPrices[flight.flightId], 0, 'COMMA', 0, 'POINT') : 
                                    #numbers.formatDecimal(flight.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                            </div>
                <button type="button"
                    th:data-flight-id="${flight.flightId}"
                    data-leg="outbound"
                    th:disabled="${(availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) == 0}"
                    th:class="${(availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) == 0 ? 'btn btn-secondary disabled book-btn' : 'btn btn-primary open-seat-modal book-btn'}">
                                <i class="fas fa-arrow-right me-2"></i>Chọn chỗ
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- PHẦN CHUYẾN VỀ -->
                <div th:if="${tripType == 'roundtrip'}" id="return-section">
                    <hr/>
                    <div class="row mt-4">
                        <div class="col-12 text-center">
                            <h2 class="fw-bold">Chuyến Về</h2>
                        </div>
                        <div class="col-md-4">
                            <div class="location-info">
                                <p><i class="fas fa-map-marker-alt me-2"></i>Khởi hành</p>
                                <h3 th:text="${arrivalAirport.airportName} + ' (' + ${arrivalAirport.airportCode} + ')'"></h3>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="location-info">
                                <p><i class="fas fa-map-marker-alt me-2"></i>Điểm đến</p>
                                <h3 th:text="${departureAirport.airportName} + ' (' + ${departureAirport.airportCode} + ')'"></h3>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="location-info" th:if="${returnDate != null and !#strings.isEmpty(returnDate)}">
                                <p><i class="fa-regular fa-calendar-days me-2"></i>Ngày về</p>
                                <h3 th:text="${returnDate}"></h3>
                            </div>
                        </div>
                    </div>
                    <h3 th:if="${returnFlights == null or returnFlights.isEmpty()}" class="text-center fw-bold text-result">Không có chuyến về phù hợp</h3>
                    
                    <!-- LAYOUT MỚI: Return Train Cards -->
                    <div th:unless="${returnFlights == null or returnFlights.isEmpty()}" class="train-list mt-3">
                        <div th:each="flight : ${returnFlights}" class="train-card">
                                <div class="train-info">
                                    <div class="train-code" th:text="${flight.flightNumber}"></div>
                                    <div class="available-seats" th:text="${'Còn ' + (availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) + ' ghế trống'}"></div>
                                </div>

                            <div class="journey-details">
                                <div class="station-time">
                                    <div class="station-name" th:text="${arrivalAirport.airportName}"></div>
                                    <div class="time" th:text="${#temporals.format(flight.departureTime, 'HH:mm')}"></div>
                                    <div class="date" th:text="${#temporals.format(flight.departureTime, 'dd/MM/yyyy')}"></div>
                                </div>

                                <div class="journey-visual">
                                    <div class="train-number">
                                        <span th:with="hours=${T(java.time.Duration).between(flight.departureTime, flight.arrivalTime).toHours()},
                                                       minutes=${T(java.time.Duration).between(flight.departureTime, flight.arrivalTime).toMinutes() % 60}"
                                              th:text="${hours + 'h' + minutes + 'p'}">
                                        </span>
                                    </div>
                                    <div class="journey-line"></div>
                                    <div class="duration">→</div>
                                </div>

                                <div class="station-time">
                                    <div class="station-name" th:text="${departureAirport.airportName}"></div>
                                    <div class="time" th:text="${#temporals.format(flight.arrivalTime, 'HH:mm')}"></div>
                                    <div class="date" th:text="${#temporals.format(flight.arrivalTime, 'dd/MM/yyyy')}"></div>
                                </div>
                            </div>

                            <div class="price-booking">
                                <div class="price-label">Từ</div>
                                <div class="price">
                                    <span th:text="${minPrices[flight.flightId] != null ? 
                                        #numbers.formatDecimal(minPrices[flight.flightId], 0, 'COMMA', 0, 'POINT') : 
                                        #numbers.formatDecimal(flight.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                                </div>
                <button type="button"
                    th:data-flight-id="${flight.flightId}"
                    data-leg="return"
                    th:disabled="${(availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) == 0}"
                    th:class="${(availableSeats[flight.flightId] != null ? availableSeats[flight.flightId] : flight.seatCapacity) == 0 ? 'btn btn-secondary disabled book-btn' : 'btn btn-primary open-seat-modal book-btn'}">
                                    <i class="fas fa-arrow-right me-2"></i>Chọn chỗ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Seat Selection Modal -->
<div class="modal fade" id="seatSelectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="seat-modal-title">Chọn ghế</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0" id="seat-modal-body">
                <!-- dynamic seat content -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="confirm-seat-selection">Xác nhận</button>
            </div>
        </div>
    </div>
    
    <!-- hidden holder for fetched HTML to safely query elements -->
    <div id="seat-modal-cache" class="d-none"></div>
</div>

<th:block th:replace="~{/common/layout :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/seat.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/flight.js"></script>
<script th:inline="javascript">
    (function(){
    const modalEl = document.getElementById('seatSelectModal');
    let modal;
    let currentLeg = 'outbound';
    let currentFlightId = null;
    const selection = { outbound: null, return: null };

    // Ensure Bootstrap is loaded
    function ensureBootstrapLoaded() {
        return new Promise((resolve) => {
            if (window.bootstrap && window.bootstrap.Modal) {
                resolve();
                return;
            }
            const existing = document.querySelector('script[data-dynamic-bootstrap]');
            if (existing) {
                existing.addEventListener('load', () => resolve());
                return;
            }
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js';
            s.setAttribute('data-dynamic-bootstrap', 'true');
            s.onload = () => resolve();
            s.onerror = () => {
                console.error('Failed to load Bootstrap');
                resolve();
            };
            document.body.appendChild(s);
        });
    }

    function ensureModal(){
        if (!modal && window.bootstrap && window.bootstrap.Modal) {
            modal = new bootstrap.Modal(modalEl);
        }
        return modal;
    }

    function initializeSeatSelection() {
        console.log('[Seat] Initializing selection logic...');
        // Corrected selector for the new grid layout
        const seatInputs = document.querySelectorAll('#seat-modal-body .seat input[type="checkbox"]:not([disabled])');
        
        const seatIdsInput = document.getElementById('seat-ids');
        const selectedSeatsDisplay = document.querySelector('#seat-modal-body .selected-seats');
        const totalPriceDisplay = document.querySelector('#seat-modal-body .total-price');
        const selectedCountDisplay = document.querySelector('#seat-modal-body #selected-count');   
        const classTypeDisplay = document.querySelector('#seat-modal-body #seat-class-type');
        const seatPriceInput = document.getElementById('seat-price');

        if (!seatIdsInput) {
            console.error('[Seat] Missing #seat-ids input');
            return;
        }

        const selectedSeats = new Set();

        seatInputs.forEach(input => {
            const label = input.nextElementSibling;
            const seatId = input.dataset.seatId;
            const seatNumber = input.dataset.seatNumber;
            const seatLi = input.closest('.seat');

            if (!seatLi || !seatId) return;

            const handleClick = (e) => {
                e.preventDefault();
                if (input.disabled) return;

                if (seatLi.classList.contains('selected')) {
                    seatLi.classList.remove('selected');
                    selectedSeats.delete(seatId);
                } else {
                    seatLi.classList.add('selected');
                    selectedSeats.add(seatId);
                }
                updateSummary();
            };

            input.addEventListener('click', handleClick);
            if (label) label.addEventListener('click', handleClick);
        });

        function updateSummary() {
            const count = selectedSeats.size;
            let totalPrice = 0;

            const seatNumbers = [];
            const seatIds = [];
            const classTypes = new Set();

            selectedSeats.forEach(id => {
                const el = document.querySelector(`#seat-modal-body input[data-seat-id="${id}"]`);
                if (!el) return;
                const p = parseFloat(el.dataset.seatPrice) || 0;
                const classType = el.dataset.classType || '';
                totalPrice += p;
                seatNumbers.push(el.dataset.seatNumber || id);
                seatIds.push(id);

                if (classType) {
                    classTypes.add(classType);
                }
            });

            seatIdsInput.value = seatIds.join(',');
            if (seatPriceInput) seatPriceInput.value = totalPrice;

            if (selectedCountDisplay) selectedCountDisplay.textContent = count;
            if (selectedSeatsDisplay) {
                if (seatNumbers.length === 0) {
                    selectedSeatsDisplay.innerHTML = '<span class="text-muted italic">Chưa chọn ghế</span>';
                } else {
                    selectedSeatsDisplay.innerHTML = seatNumbers.map(num => `<span class="badge bg-primary me-1">${num}</span>`).join('');
                }
            }
            if (totalPriceDisplay) totalPriceDisplay.textContent = totalPrice.toLocaleString('vi-VN') + ' ₫';
            if (classTypeDisplay) {
                const classTypeText = classTypes.size > 0 ? Array.from(classTypes).join(', ') : '--';
                classTypeDisplay.textContent = classTypeText;
            }
        }

        updateSummary();
    }

    function initializeBootstrapTabs() {
        const tabList = document.querySelector('#seat-modal-body .nav-pills');
        if (!tabList) return;

        tabList.querySelectorAll('.nav-link').forEach(tabEl => {
            const newTab = new bootstrap.Tab(tabEl);
            tabEl.addEventListener('click', (e) => {
                e.preventDefault();
                newTab.show();
            });
        });

        const activeTab = tabList.querySelector('.nav-link.active');
        if (!activeTab) {
            const firstTab = tabList.querySelector('.nav-link');
            if (firstTab) {
                firstTab.classList.add('active');
                const targetId = firstTab.getAttribute('data-bs-target');
                const pane = document.querySelector(targetId);
                if (pane) {
                    pane.classList.add('show', 'active');
                }
            }
        }
    }

    async function openSeatModal(flightId, leg){
        console.log('[Seat] openSeatModal called', { flightId, leg });
        showLoading();
        try {
            const body = document.getElementById('seat-modal-body');
            body.innerHTML = '<div class="text-center p-5"><div class="spinner-border" role="status"></div><p class="mt-3">Đang tải sơ đồ ghế...</p></div>';

            await ensureBootstrapLoaded();
            currentLeg = leg;
            currentFlightId = flightId;

            console.log('[Seat] Fetching /flights/' + flightId + '/seats ...');
            const resp = await fetch(`/flights/${flightId}/seats`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' },
                credentials: 'same-origin'
            });

            console.log('[Seat] HTTP status:', resp.status, resp.statusText);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);

            const sections = await resp.json();
            console.log('[Seat] Received', sections.length, 'sections:', sections);

            // ---- Build the UI ----
            const styleId = 'dynamic-seat-styles';
            if (!document.getElementById(styleId)) {
                const style = document.createElement('style');
                style.id = styleId;
                style.innerHTML = `
                    .plane-container {
                        background: #f8f9fa;
                        border-radius: 40px 40px 10px 10px;
                        padding: 40px 20px;
                        border: 2px solid #dee2e6;
                        max-width: 500px;
                        margin: 0 auto;
                        box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
                    }
                    .seat-grid {
                        display: grid;
                        grid-template-columns: repeat(3, 45px) 40px repeat(3, 45px);
                        gap: 8px;
                        justify-content: center;
                        align-items: center;
                    }
                    .row-label {
                        text-align: center;
                        font-weight: bold;
                        color: #6c757d;
                        font-size: 0.8rem;
                    }
                    .seat {
                        width: 40px;
                        height: 40px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        border-radius: 6px;
                        border: 1px solid #adb5bd;
                        background: #fff;
                        cursor: pointer;
                        user-select: none;
                        font-size: 0.75rem;
                        transition: all 0.2s;
                    }
                    .seat:hover:not(.occupied) {
                        border-color: #0d6efd;
                        background: #e7f1ff;
                    }
                    .seat.occupied {
                        background: #dee2e6;
                        border-color: #ced4da;
                        color: #adb5bd;
                        cursor: not-allowed;
                    }
                    .seat input { display: none; }
                    .seat.selected {
                        background: #0d6efd;
                        border-color: #0d6efd;
                        color: #fff;
                    }
                `;
                document.head.appendChild(style);
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'container-fluid p-3';

            // Render all seats without any section/deck headers or tabs
            let mergedGridHtml = '';
            sections.forEach(sec => {
                const rowMap = {};
                sec.seats.forEach(s => {
                    const rowMatch = s.number.match(/^(\d+)/);
                    const rowNum = rowMatch ? rowMatch[1] : '0';
                    if (!rowMap[rowNum]) rowMap[rowNum] = {};
                    const colMatch = s.number.match(/([A-Z])$/);
                    const colLetter = colMatch ? colMatch[1] : 'X';
                    rowMap[rowNum][colLetter] = s;
                });

                const sortedRowKeys = Object.keys(rowMap).sort((a, b) => parseInt(a) - parseInt(b));
                sortedRowKeys.forEach(rowKey => {
                    const rowSeats = rowMap[rowKey];
                    const cols = ['A', 'B', 'C', 'AISLE', 'D', 'E', 'F'];
                    cols.forEach(col => {
                        if (col === 'AISLE') {
                            mergedGridHtml += `<div class="row-label">${rowKey}</div>`;
                        } else {
                            const s = rowSeats[col];
                            if (s) {
                                const avail = s.status === 'AVAILABLE';
                                const priceVnd = Number(s.price).toLocaleString('vi-VN');
                                mergedGridHtml += `
                                    <div class="seat ${!avail ? 'occupied' : ''}" 
                                         title="${s.number} - ${s.classType} - ${priceVnd}₫">
                                        <input type="checkbox" id="seat-${s.id}"
                                               ${!avail ? 'disabled' : ''}
                                               data-seat-id="${s.id}"
                                               data-seat-number="${s.number}"
                                               data-seat-price="${s.price}"
                                               data-class-type="${s.classType}" />
                                        <label for="seat-${s.id}" style="cursor:inherit">${col}</label>
                                    </div>`;
                            } else { mergedGridHtml += `<div></div>`; }
                        }
                    });
                });
            });

            const summaryHtml = `
                <div class="summary p-3 border rounded shadow-sm">
                    <h5 class="fw-bold mb-3">Tóm tắt hành trình</h5>
                    <p><strong>Loại ghế:</strong> <span id="seat-class-type">--</span></p>
                    <p><strong>Số ghế đã chọn:</strong> <span id="selected-count">0</span></p>
                    <p><strong>Mã ghế:</strong> <span class="selected-seats text-primary">Chưa chọn ghế</span></p>
                    <hr>
                    <p><strong>Tổng tiền:</strong> <span class="total-price text-danger fs-5 fw-bold">0 VND</span></p>
                    <input type="hidden" id="seat-price" value="0">
                    <input type="hidden" name="flightId" value="${flightId}">
                    <input type="hidden" id="seat-ids" name="seatIds">
                </div>`;

            wrapper.innerHTML = `
                <div class="row">
                    <div class="col-xl-8 col-12">
                        <div class="plane-container shadow-sm mb-4">
                            <div class="bus-steering text-center mb-4 text-muted">
                                <i class="fa-solid fa-plane-up fa-2xl"></i><br>
                                <small class="text-uppercase fw-bold">Mũi máy bay</small>
                            </div>
                            <div class="seat-grid">${mergedGridHtml}</div>
                        </div>
                    </div>
                    <div class="col-xl-4 col-12">${summaryHtml}</div>
                </div>`;

            body.innerHTML = '';
            body.appendChild(wrapper);
            console.log('[Seat] Modal HTML injected ✓');

            const title = document.getElementById('seat-modal-title');
            const confirmBtn = document.getElementById('confirm-seat-selection');
            const meta = document.getElementById('search-meta');
            const isRT = meta && meta.dataset.tripType === 'roundtrip';

            if (title) title.textContent = leg === 'return' ? 'Chọn ghế - Chiều về' : 'Chọn ghế - Chiều đi';
            if (confirmBtn) confirmBtn.textContent = (isRT && leg === 'outbound') ? 'Chọn chuyến về' : 'Tiến hành thanh toán';

            initializeBootstrapTabs();
            initializeSeatSelection();
            ensureModal().show();
            console.log('[Seat] Modal shown ✓');

        } catch (error) {
            console.error('[Seat] Error loading seat modal:', error);
            if (window.Swal) {
                Swal.fire({ icon: 'error', title: 'Lỗi tải ghế', text: error.message || 'Vui lòng thử lại.' });
            } else {
                alert('Lỗi: ' + error.message);
            }
        } finally {
            hideLoading();
        }
    }

    // MỞ MODAL KHI NHẤN NÚT "Chọn"
    document.addEventListener('click', function(e){
        const btn = e.target.closest('.open-seat-modal');
        if (!btn) return;
        
        e.preventDefault();
        
        const flightId = btn.getAttribute('data-flight-id');
        const leg = btn.getAttribute('data-leg') || 'outbound';
        
        if (!flightId) return;
        
        openSeatModal(flightId, leg);
    });

    // XÁC NHẬN CHỌN GHẾ
    document.getElementById('confirm-seat-selection').addEventListener('click', function(){
        const seatIdsInput = document.getElementById('seat-ids');
        
        if (!seatIdsInput || !seatIdsInput.value) {
            Swal.fire({ 
                icon: 'warning', 
                title: 'Chưa chọn ghế',
                text: 'Vui lòng chọn ít nhất 1 ghế' 
            });
            return;
        }
        
        const seatIds = seatIdsInput.value.split(',').map(s => s.trim()).filter(Boolean);
        const seatPrice = document.getElementById('seat-price')?.value || 0;

        // Lấy seat numbers từ badge hiển thị trong modal
        const seatNumberEls = document.querySelectorAll('#seat-modal-body .selected-seats .badge');
        const seatNumbers = Array.from(seatNumberEls).map(el => el.textContent.trim());
        const classType = document.getElementById('seat-class-type')?.textContent?.trim() || '';

        selection[currentLeg] = { 
            flightId: currentFlightId, 
            seatIds: seatIds,
            seatNumbers: seatNumbers,
            seatPrice: parseFloat(seatPrice),
            classType: classType
        };
        
        ensureModal().hide();

        const meta = document.getElementById('search-meta');
        const isRT = meta && meta.dataset.tripType === 'roundtrip';
        
        if (!isRT) {
            submitPayment('outbound');
        } else if (currentLeg === 'outbound') {
            Swal.fire({ 
                icon: 'success', 
                title: 'Đã lưu ghế chiều đi',
                text: 'Vui lòng chọn ghế chiều về.' 
            });
            document.getElementById('return-section')?.scrollIntoView({ behavior: 'smooth' });
        } else if (currentLeg === 'return' && selection.outbound && selection.return) {
            submitPayment('both');
        }
    });

    function submitPayment(leg) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/passenger-info';

        function addHidden(name, value) {
            const i = document.createElement('input');
            i.type = 'hidden'; i.name = name; i.value = value;
            form.appendChild(i);
        }

        // Lấy thông tin ghế từ modal summary
        function collectSeatInfo(sel) {
            const seatNumberEls = document.querySelectorAll('#seat-modal-body .selected-seats .badge');
            const seatNumbers = Array.from(seatNumberEls).map(el => el.textContent.trim());
            const totalPrice = document.getElementById('seat-price')?.value || 0;
            const classType  = document.getElementById('seat-class-type')?.textContent?.trim() || '';
            return { seatNumbers, totalPrice, classType };
        }

        if (leg === 'both') {
            const out = selection.outbound;
            const ret = selection.return;
            if (!out || !ret) return;

            addHidden('outboundFlightId', out.flightId);
            out.seatIds.forEach(id => addHidden('outboundSeatIds', id));
            out.seatNumbers.forEach(n => addHidden('outboundSeatNumbers', n));
            addHidden('outboundTotalPrice', out.seatPrice);
            addHidden('outboundClassType', out.classType || '');

            addHidden('returnFlightId', ret.flightId);
            ret.seatIds.forEach(id => addHidden('returnSeatIds', id));
            ret.seatNumbers.forEach(n => addHidden('returnSeatNumbers', n));
            addHidden('returnTotalPrice', ret.seatPrice);
            addHidden('returnClassType', ret.classType || '');
        } else {
            const data = selection[leg];
            if (!data) return;
            addHidden('flightId', data.flightId);
            data.seatIds.forEach(id => addHidden('seatIds', id));
            data.seatNumbers.forEach(n => addHidden('seatNumbers', n));
            addHidden('totalPrice', data.seatPrice);
            addHidden('classType', data.classType || '');
        }

        document.body.appendChild(form);
        form.submit();
    }
})();
</script>
</body>
</html>
